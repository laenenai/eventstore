version: "2"

sql:
  - engine: sqlite
    schema:
      - migrations/00001_initial_schema.sql
      - migrations/00002_outbox_next_attempt_at.sql
      - migrations/00003_state_cache.sql
      - migrations/00004_projection_checkpoint.sql
      - migrations/00005_projection_dlq.sql
      - migrations/00006_processed_events.sql
      - migrations/00007_state_cache_jsonb.sql
      - migrations/00008_state_cache_schema_version.sql
      - migrations/00010_state_stream_subscribers.sql
      - migrations/00011_subscriber_dlq.sql
      - migrations/00012_tamper_evident_chain.sql
      - migrations/00013_subscriber_dlq_batch.sql
    queries: queries/
    gen:
      go:
        package: db
        out: internal/db
        sql_package: database/sql
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_result_struct_pointers: false
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
        overrides:
          # UUIDs are stored as TEXT in SQLite; Go side is google/uuid.UUID
          # (which knows how to scan from string columns via the Scanner
          # interface).
          - column: "events.event_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "events.correlation_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "events.causation_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "events.command_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "outbox.event_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "projection_dlq.event_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "processed_events.event_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

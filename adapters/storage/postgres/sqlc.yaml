version: "2"

sql:
  - engine: postgresql
    # sqlc reads the parent-table migration + subsequent ALTERs.
    # Partition children (00002) are skipped to avoid redundant
    # per-partition type structs. Goose runs everything.
    schema:
      - migrations/00001_initial_schema.sql
      - migrations/00003_outbox_next_attempt_at.sql
      - migrations/00004_state_cache.sql
      - migrations/00005_projection_checkpoint.sql
      - migrations/00006_projection_dlq.sql
      - migrations/00007_processed_events.sql
      - migrations/00009_state_cache_schema_version.sql
      - migrations/00011_state_stream_subscribers.sql
      - migrations/00012_subscriber_dlq.sql
      - migrations/00013_tamper_evident_chain.sql
      - migrations/00014_subscriber_dlq_batch.sql
    queries: queries/
    gen:
      go:
        package: db
        out: internal/db
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_result_struct_pointers: false
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
        overrides:
          # UUIDs flow through the framework as google/uuid.UUID rather
          # than pgx's pgtype.UUID — keeps the public surface free of
          # pgx-specific types.
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          # JSONB columns are framework-controlled shapes. json.RawMessage
          # is the transport type; higher layers parse into typed structs
          # (encryption_key_refs, payload_json).
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"

          # TIMESTAMPTZ → time.Time. The nullable variant uses *time.Time
          # rather than pgtype.Timestamptz so adapter callers never touch
          # pgx-specific types.
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true

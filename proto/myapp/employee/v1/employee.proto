syntax = "proto3";

package myapp.employee.v1;

import "es/v1/options.proto";

option go_package = "github.com/laenenai/eventstore/gen/myapp/employee/v1;employeev1";

// Employee — the realistic data-classification example (ADR 0010 +
// ADR 0027, cookbook 11). PII fields carry
// (es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL; the
// codegen-emitted EncryptPII / DecryptPII methods round-trip them
// through the framework's Shredder. String PII fields are stored as
// base64'd ciphertext at rest so the field remains UTF-8 valid;
// bytes PII fields are stored as raw ciphertext.
//
// Non-PII operational fields (department, status, current_role) use
// DATA_CLASSIFICATION_INTERNAL — plaintext at rest, excluded from
// DSAR export, no audit-on-read overhead.

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE      = 1;
  STATUS_ON_LEAVE    = 2;
  STATUS_TERMINATED  = 3;
}

message Employee {
  option (es.v1.aggregate) = "employee";

  string employee_id   = 1 [(es.v1.subject_field) = true];
  string legal_name    = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string email         = 3 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string date_of_birth = 4 [(es.v1.data_classification) = DATA_CLASSIFICATION_QUASI_IDENTIFIER];  // ISO 8601 YYYY-MM-DD — quasi-identifier per HIPAA
  string department    = 5 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
  string current_role  = 6 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
  Status status        = 7 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
}

// ---- Commands ------------------------------------------------------------

message Hire {
  string employee_id   = 1;
  string legal_name    = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string email         = 3 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string date_of_birth = 4 [(es.v1.data_classification) = DATA_CLASSIFICATION_QUASI_IDENTIFIER];
  string department    = 5;
  string initial_role  = 6;
}

message Promote {
  string new_role = 1;
}

message Terminate {
  // Free-form notes often contain PII (manager observations, etc.).
  string reason = 1 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
}

message Commands {
  option (es.v1.sum_type) = "Command";
  oneof variant {
    Hire      hire      = 1;
    Promote   promote   = 2;
    Terminate terminate = 3;
  }
}

// ---- Events --------------------------------------------------------------

message Hired {
  string employee_id   = 1 [(es.v1.subject_field) = true];
  string legal_name    = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string email         = 3 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string date_of_birth = 4 [(es.v1.data_classification) = DATA_CLASSIFICATION_QUASI_IDENTIFIER];
  string department    = 5 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
  string initial_role  = 6 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
}

message Promoted {
  string employee_id = 1 [(es.v1.subject_field) = true];
  string new_role    = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
}

message Terminated {
  string employee_id = 1 [(es.v1.subject_field) = true];
  // Free-form notes often contain PII (manager observations, etc.).
  string reason = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
}

message Events {
  option (es.v1.sum_type) = "Event";
  oneof variant {
    Hired      hired      = 1;
    Promoted   promoted   = 2;
    Terminated terminated = 3;
  }
}

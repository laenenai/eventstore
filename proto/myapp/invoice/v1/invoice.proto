syntax = "proto3";

package myapp.invoice.v1;

import "es/v1/options.proto";

option go_package = "github.com/laenenai/eventstore/gen/myapp/invoice/v1;invoicev1";

// Invoice — a small but realistic aggregate exercising:
//
//   - Tier 1 state_cache for "list of invoices by status" reads
//     (cookbook recipe 07).
//   - IsTerminal: paid and voided invoices are closed; no further
//     commands accepted (ADR 0003 / runtime check).
//   - Multi-line invoice state for MV-friendly read shapes.
//
// Lifecycle:
//
//     Created --pay--> Paid (terminal)
//             \-void-> Voided (terminal)

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_OPEN        = 1;
  STATUS_PAID        = 2;
  STATUS_VOIDED      = 3;
}

message LineItem {
  string sku       = 1;
  string name      = 2;
  int64  quantity  = 3;
  int64  unit_cents = 4;
}

// ==========================================================================
// State
// ==========================================================================

message Invoice {
  option (es.v1.aggregate) = "invoice";

  string invoice_id   = 1 [(es.v1.subject_field) = true];
  string customer_id  = 2;
  string currency     = 3;
  int64  total_cents  = 4;
  Status status       = 5;
  repeated LineItem line_items = 6;
  int64  created_at_ms  = 7;
  int64  closed_at_ms   = 8; // when status moved to PAID or VOIDED
  string payment_ref    = 9; // when paid
  string void_reason    = 10; // when voided
}

// ==========================================================================
// Commands
// ==========================================================================

message Create {
  string invoice_id  = 1;
  string customer_id = 2;
  string currency    = 3;
  repeated LineItem line_items = 4;
  int64  created_at_ms = 5;
}

message MarkPaid {
  string payment_ref = 1;
  int64  paid_at_ms  = 2;
}

message Void {
  string reason     = 1;
  int64  voided_at_ms = 2;
}

message Commands {
  option (es.v1.sum_type) = "Command";
  oneof variant {
    Create   create    = 1;
    MarkPaid mark_paid = 2;
    Void     do_void   = 3;
  }
}

// ==========================================================================
// Events
// ==========================================================================

message Created {
  string invoice_id  = 1;
  string customer_id = 2;
  string currency    = 3;
  int64  total_cents = 4;
  repeated LineItem line_items = 5;
  int64  created_at_ms = 6;
}

message Paid {
  string payment_ref = 1;
  int64  paid_at_ms  = 2;
}

message Voided {
  string reason       = 1;
  int64  voided_at_ms = 2;
}

message Events {
  option (es.v1.sum_type) = "Event";
  oneof variant {
    Created created = 1;
    Paid    paid    = 2;
    Voided  voided  = 3;
  }
}

version: v2

modules:
  - path: .
    name: buf.build/laenenai/eventstore

lint:
  use:
    - STANDARD
    - PACKAGE_VERSION_SUFFIX
  # The framework's codegen reads (es.v1.projection).events as
  # fully-qualified type-name strings, not as direct proto references.
  # buf lint's IMPORT_USED check doesn't see this and flags the imports
  # as unused — but protoc-gen-es-go fails without them, so the rule
  # is wrong for these specific files.
  ignore_only:
    IMPORT_USED:
      - myapp/customerview/v1/customerview.proto
      - test/projection/v1/projection.proto
    # The legacy package is intentionally named
    # `test.piimigration.v1.legacy` (no trailing version suffix). It
    # is a frozen sibling of `test.piimigration.v1` kept solely for
    # the read-time upcaster in cookbook recipe 11 § "PII shape
    # migration (Tier D, ADR 0030)". Adding a `.v1` suffix would
    # mis-suggest the file evolves independently; it does not.
    PACKAGE_VERSION_SUFFIX:
      - test/piimigration/v1/legacy/legacy.proto

breaking:
  use:
    - FILE

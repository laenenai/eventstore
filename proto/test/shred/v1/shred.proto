syntax = "proto3";

package test.shred.v1;

import "es/v1/options.proto";

option go_package = "github.com/laenenai/eventstore/gen/test/shred/v1;shredv1";

// Test-only aggregate exercising the codegen-emitted crypto-shredding
// hooks (ADR 0010 + ADR 0027). The Person state is a stand-in for any
// aggregate where a stream's identifier doubles as the encryption
// subject. Demonstrates the bytes-PII flavour (raw ciphertext at rest);
// string-PII (base64'd at rest) is exercised in myapp/employee.

message Person {
  option (es.v1.aggregate) = "person";

  string person_id    = 1 [(es.v1.subject_field) = true];
  bytes  display_name = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
}

// ---- Commands ------------------------------------------------------------

message Register {
  string person_id    = 1;
  bytes  display_name = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  bytes  email        = 3 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
}

message UpdateName {
  bytes new_display_name = 1 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
}

message Commands {
  option (es.v1.sum_type) = "Command";
  oneof variant {
    Register   register    = 1;
    UpdateName update_name = 2;
  }
}

// ---- Events --------------------------------------------------------------

message Registered {
  // Subject for this event's PII fields. Same value as Person.person_id.
  string person_id    = 1 [(es.v1.subject_field) = true];
  bytes  display_name = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  bytes  email        = 3 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string referrer_id  = 4 [(es.v1.data_classification) = DATA_CLASSIFICATION_INTERNAL];
}

message NameChanged {
  string person_id        = 1 [(es.v1.subject_field) = true];
  bytes  new_display_name = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
}

// AuthorizedWithSAD models the post-PCI-authorization receipt: the
// auth_code is PERSONAL and persistable, but the cvv is SAD (PCI-DSS
// §3.2 — Sensitive Authentication Data) and MUST NOT be persisted.
// Used by tests to verify codegen emits the runtime SAD reject in
// EncryptPII / DecryptPII (ADR 0027). Never appears in a decider path;
// constructed and submitted to EncryptPII directly.
message AuthorizedWithSAD {
  string person_id = 1 [(es.v1.subject_field) = true];
  string auth_code = 2 [(es.v1.data_classification) = DATA_CLASSIFICATION_PERSONAL];
  string cvv       = 3 [(es.v1.data_classification) = DATA_CLASSIFICATION_SAD];
}

message Events {
  option (es.v1.sum_type) = "Event";
  oneof variant {
    Registered        registered          = 1;
    NameChanged       name_changed        = 2;
    AuthorizedWithSAD authorized_with_sad = 3;
  }
}

syntax = "proto3";

package test.unitsmigration.v1;

import "es/v1/options.proto";

option go_package = "github.com/laenenai/eventstore/gen/test/unitsmigration/v1;unitsmigrationv1";

// Test-only fixture for the unit-conversion upcaster documented in
// cookbook recipe 21 "Schema evolution — Tier-B upcaster (unit
// conversion)".
//
// Two protos cooperate to prove the Tier-B pattern from ADR 0030:
//
//   * This file — the CURRENT (post-migration) shape of
//     MeasurementRecorded. The event carries
//     (es.v1.schema_version) = 2 and stores latency in
//     **microseconds** under `latency_us`.
//   * proto/test/unitsmigration/v1/legacy/legacy.proto — the FROZEN
//     pre-migration shape: `latency_ms` (milliseconds) on the same
//     field tag. Hand-written; never regenerated against current
//     options. Lives in a sibling package so the codegen plugin
//     treats it as a separate compilation unit.
//
// The wire encoding is identical between the two — proto3 doesn't
// know about field names, only tags + types. What changes is the
// *interpretation* of the same int64. That's Tier B per ADR 0030:
// "same wire encoding, different meaning." A value of 5 read as a
// v1 event was 5 ms; the same 5 bytes read as v2 must produce
// 5_000 µs.
//
// The wrapper codec at gen/test/unitsmigration/v1/migrating_codec.go
// dispatches on schemaVersion: v2 falls through to the
// codegen-emitted EventCodec; v1 decodes via legacyv1.MeasurementRecordedV1
// and multiplies the millisecond value by 1000 to produce the
// current-shape event in microseconds.

// MeasurementRecorded is the post-migration event shape. Field 2
// was renamed from `latency_ms` (v1) to `latency_us` (v2) and the
// recorded values shifted from milliseconds to microseconds —
// callers reporting higher resolution. The on-disk bytes for
// existing v1 rows don't change; only the read-time interpretation
// does, mediated by the upcaster.
message MeasurementRecorded {
  option (es.v1.schema_version) = 2;

  // Stable opaque identifier for the measurement series. Subject
  // field — never PII on its own (per ADR 0027) but it pins the
  // event to a particular logical stream so projections can group
  // by it.
  string measurement_id = 1 [(es.v1.subject_field) = true];

  // Latency in microseconds. v1 stored milliseconds under the same
  // tag; the upcaster multiplies by 1000 when reading legacy bytes.
  int64 latency_us = 2;
}

// Events is the sealed sum-type container. One variant is enough —
// the migration only changes MeasurementRecorded's units; the
// codegen-emitted EventCodec is what the wrapper delegates to for
// v2 payloads.
message Events {
  option (es.v1.sum_type) = "Event";
  oneof variant {
    MeasurementRecorded measurement_recorded = 1;
  }
}

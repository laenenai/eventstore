version: v2

managed:
  enabled: true

plugins:
  # Standard Go protobuf codegen. Produces the wire-format types used
  # by adapter code, codecs, and consumers.
  - remote: buf.build/protocolbuffers/go
    out: ../gen
    opt:
      - paths=source_relative

  # Framework-specific codegen. Reads es.v1.* proto options and emits
  # sealed-interface sum types, Codecs, typed StreamID wrappers, and
  # decider stubs (ADRs 0004, 0008, 0013, 0016).
  #
  # Invoked via `go run` so no separate `go install` step is needed —
  # the workspace (go.work) resolves the cmd/protoc-gen-es-go package
  # to its local source. Go's build cache handles incremental compiles.
  - local: ["go", "run", "../cmd/protoc-gen-es-go"]
    out: ../gen
    opt:
      - paths=source_relative

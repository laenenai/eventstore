version: v2

managed:
  enabled: true

plugins:
  # Standard Go protobuf codegen. Produces the wire-format types used
  # by adapter code, codecs, and consumers.
  - remote: buf.build/protocolbuffers/go
    out: ../gen
    opt:
      - paths=source_relative

  # Framework-specific codegen. Reads es.v1.* proto options and emits
  # sealed-interface sum types, Codecs, typed StreamID wrappers, and
  # decider stubs (ADRs 0004, 0008, 0013, 0016).
  #
  # Invoked via `go run` so no separate `go install` step is needed.
  # The plugin is a command in the root module (cmd/protoc-gen-es-go),
  # so any consumer can run it by its full import path without a
  # workspace replace — Go's build cache handles incremental compiles.
  - local: ["go", "run", "github.com/laenenai/eventstore/cmd/protoc-gen-es-go"]
    out: ../gen
    opt:
      - paths=source_relative

  # Same plugin, runtime=restate mode. Emits Restate service handlers
  # for aggregates whose commands carry (es.v1.stream_id) +
  # (es.v1.tenant_id) annotations. Output lives in the cmdworkflow/
  # restate adapter's gen tree so the restate-sdk-go transitive dep
  # is contained to the adapter (ADR 0026 § 3).
  - local: ["go", "run", "github.com/laenenai/eventstore/cmd/protoc-gen-es-go"]
    out: ../adapters/cmdworkflow/restate/gen
    opt:
      - paths=source_relative
      - runtime=restate

  # Same plugin, runtime=dbos mode. Emits DBOS workflow handlers for
  # annotated aggregates. Output lives in the cmdworkflow/dbos adapter's
  # gen tree, similar to the Restate codegen.
  - local: ["go", "run", "github.com/laenenai/eventstore/cmd/protoc-gen-es-go"]
    out: ../adapters/cmdworkflow/dbos/gen
    opt:
      - paths=source_relative
      - runtime=dbos

syntax = "proto3";

package es.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/laenenai/eventstore/gen/es/v1;esv1";

// Framework-defined protobuf options consumed by protoc-gen-es-go to
// drive code generation. See ADR 0004 (sum-type representation),
// ADR 0008 (stream identity), ADR 0010 (crypto-shredding), and
// ADR 0013 (schema evolution).
//
// Usage in a domain .proto:
//
//   syntax = "proto3";
//   import "es/v1/options.proto";
//
//   message UserState {
//     option (es.v1.aggregate) = "user";
//     string user_id = 1 [(es.v1.subject_field) = true];
//     string email   = 2;  // default: PII, encrypted
//     int64  balance = 3 [(es.v1.non_pii) = true];
//   }

// ---- Message-level options -----------------------------------------------

extend google.protobuf.MessageOptions {
  // Marks this message as the State type of a top-level aggregate.
  // The value is the aggregate's short name; codegen emits typed
  // StreamID wrappers in a Go package named after it
  // (e.g., `user.StreamID`, `user.NewStreamID`).
  //
  // See ADR 0008.
  string aggregate = 50000;

  // The event's schema_version dispatch key (ADR 0013). Bump on
  // semantic changes that proto's wire-format compatibility cannot
  // detect. Codegen scaffolds upcaster registration stubs when a
  // bump is observed.
  uint32 schema_version = 50001;

  // Marks this message as a sum-type container holding exactly one
  // oneof field whose variants form a sealed Go interface. The value
  // is the name of the generated interface — typically "Command" or
  // "Event" for a domain. Codegen emits the interface, marker
  // methods on each variant, and a Codec implementation that proto-
  // marshals each variant under its full proto type URL.
  //
  // See ADR 0004.
  string sum_type = 50002;

  // Declares this message as a projection spec: codegen emits a
  // typed Projection interface and dispatcher for the listed events.
  // Mutually compatible with `aggregate` (a State-and-projection
  // hybrid) but typically used on a dedicated dummy message:
  //
  //   message UserViewProjection {
  //     option (es.v1.projection) = {
  //       name: "user-view"
  //       events: [
  //         "myapp.invoice.v1.Created",
  //         "myapp.customer.v1.NameChanged"
  //       ]
  //     };
  //   }
  //
  // The generated dispatcher decodes by TypeURL into the variant
  // struct from each referenced event's package and invokes the
  // typed handler. Adding/removing an event from the list breaks
  // the implementation at compile time.
  //
  // Use this for cross-aggregate projections that pick specific
  // events; for single-aggregate exhaustive projections, the
  // sum_type-emitted Projection interface in the event package
  // already suffices.
  //
  // See ADR 0020 (v2 future direction realised).
  Projection projection = 50003;
}

// Projection is the structured value of the (es.v1.projection)
// message option. See above.
message Projection {
  // Stable identifier for this projection. Used as the default
  // projection.Runtime.Name; the constant emitted is
  // <Message>Name = "<name>".
  string name = 1;

  // Full proto type names (e.g., "myapp.invoice.v1.Created") of the
  // events this projection consumes. Codegen resolves them against
  // the input file set and emits one handler method per listed event.
  repeated string events = 2;
}

// ---- Field-level options -------------------------------------------------

extend google.protobuf.FieldOptions {
  // Marks this field as the subject identifier for crypto-shredding.
  // Subject fields are auto-exempt from encryption — encrypting them
  // would require the key to find the key. At most one per message.
  //
  // See ADR 0010.
  bool subject_field = 50000;

  // Opts the field OUT of crypto-shredding. By default every field is
  // encrypted (the "deny by default" posture from ADR 0010); mark
  // known-safe fields with this option to keep them readable
  // post-shredding.
  bool non_pii = 50001;

  // Suppresses the codegen lint advisory that fires when a primitive
  // type (int*, bool, enum, Timestamp) is left default-encrypted.
  // Use when the primitive really IS PII — e.g., a salary integer or
  // a blood-pressure reading.
  bool pii_intentional = 50002;

  // Per-field subject reference for multi-subject events (transfers,
  // shared resources). Value is a field path within the same message
  // pointing at the subject identifier for this particular field.
  // When unset, the subject defaults to whichever field carries
  // (es.v1.subject_field) = true.
  string subject = 50003;

  // Marks this field as the source of the aggregate's StreamID.ID
  // component when codegen emits workflow handlers. Required on
  // every command type that participates in a sum_type = "Command"
  // set — codegen fails at build time otherwise. See ADR 0026 § 3.
  //
  // Typically each command targeting one aggregate has exactly one
  // stream_id field, usually the aggregate's id (invoice_id, etc.).
  bool stream_id = 50004;

  // Marks this field as the tenant_id source on a command. Required
  // on every command type that participates in a sum_type = "Command"
  // set — codegen fails at build time otherwise. See ADR 0026 § 3
  // and ADR 0007 (first-class multi-tenancy).
  //
  // The Connect-go / gRPC layer populates this from a request header
  // (X-Tenant-Id, JWT claim, etc.) before invoking the workflow.
  // Having tenant on every command shape keeps it first-class in the
  // audit trail.
  bool tenant_id = 50005;
}

name: ci

# Three responsibilities:
#
#   1. ci job — fast quality gate (vet, tests, examples, generated-code
#      freshness, proto lint). Fires on PRs and on push to main.
#
#   2. ci-integration job — testcontainer-backed adapter tests for
#      cmdworkflow/dbos and cmdworkflow/restate. Runs in parallel with
#      ci so total wall time isn't paying for sequential runs. Docker
#      is available on github-hosted ubuntu runners; testcontainers-go
#      uses the host Docker socket directly.
#
#      Both ci and ci-integration are required for merge. Until this
#      job existed, DBOS/Restate adapter tests only ran when a
#      maintainer typed `go test -tags dbos ./...` locally — a real
#      hole given those adapters carry the framework's production
#      command-bus story.
#
#   3. tag job — only on push to main, only after ci passes. Reads the
#      HEAD commit subject; if it carries a conventional-commits prefix
#      (feat:/fix:), computes the next synchronized version and runs
#      scripts/release.sh. Anything else (docs:, chore:, refactor:, …)
#      is a no-op.
#
# Manual releases via .github/workflows/release.yml's workflow_dispatch
# still work and override this cadence — use them for major bumps,
# prereleases, or to batch several feat/fix commits behind one tag.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # buf breaking needs main as a reachable ref. Fetch enough
          # history that it resolves on a feature-branch checkout.
          fetch-depth: 0

      # actions/checkout creates refs/remotes/origin/main but not
      # refs/heads/main. `buf breaking --against '../.git#branch=main'`
      # clones the .git directory and asks the source for a ref
      # advertised as `main`, which means refs/heads/main. Without
      # this step the lint:proto task fails on every PR with
      # "fatal: couldn't find remote ref main".
      - name: Materialize main ref for buf breaking
        if: github.ref != 'refs/heads/main'
        run: git fetch origin main:refs/heads/main

      # mise installs every tool pinned in .mise.toml (go, buf, sqlc,
      # task) at the exact version devs use locally. Without pinning,
      # `task generate:check` flakes when a new sqlc release changes
      # generated output between dev and CI environments.
      - uses: jdx/mise-action@v2

      - run: task ci

  ci-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Same main-ref materialization as the ci job — testcontainer
      # tests don't need it, but mise + go workspace setup expects a
      # consistent checkout shape.
      - name: Materialize main ref for buf breaking
        if: github.ref != 'refs/heads/main'
        run: git fetch origin main:refs/heads/main

      - uses: jdx/mise-action@v2

      # Docker is preinstalled on github-hosted ubuntu runners;
      # testcontainers-go uses the host Docker socket. No services:
      # block needed.
      - run: task ci:integration

  tag:
    needs: [ci, ci-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - uses: jdx/mise-action@v2

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          msg="$(git log -1 --pretty=%s HEAD)"
          echo "head subject: $msg"

          case "$msg" in
            feat:*|feat\(*\):*)  bump=minor ;;
            fix:*|fix\(*\):*)    bump=patch ;;
            *)
              echo "no feat:/fix: prefix — skipping release"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0 ;;
          esac

          last="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          [[ -z "$last" ]] && last="v0.0.0"
          v="${last#v}"
          IFS='.' read -r major minor patch <<<"$v"

          case "$bump" in
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          version="v${major}.${minor}.${patch}"
          echo "bump=$bump version=$version"
          echo "skip=false"       >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bump=$bump"       >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        if: steps.version.outputs.skip == 'false'
        run: ./scripts/release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

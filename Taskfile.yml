version: '3'

vars:
  # Workspace modules — published adapters + the framework root. Keep
  # in sync with go.work's `use` block (minus examples/, which run
  # separately).
  MODULES: >-
    .
    ./adapters/storage/postgres
    ./adapters/storage/sqlite
    ./adapters/authz/cedar
    ./adapters/cmdworkflow/restate
    ./adapters/cmdworkflow/dbos
    ./adapters/httpedge/connect
    ./adapters/kms/aws
    ./cmd/esctl
    ./cmd/esdocs

  # Example modules (not published, but tested in CI to catch
  # regressions in the framework-consumer contract).
  EXAMPLE_MODULES: >-
    ./examples/connectedge
    ./examples/cmdworkflow
    ./examples/employee
    ./examples/invoice

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  test:
    desc: Run unit tests across all workspace modules
    cmds:
      - |
        for mod in {{.MODULES}}; do
          echo "=== go test in $mod ===" && (cd "$mod" && go test ./...) || exit 1
        done

  test:examples:
    desc: Run example tests (catches framework-consumer contract regressions)
    cmds:
      - |
        for mod in {{.EXAMPLE_MODULES}}; do
          echo "=== go test in $mod ===" && (cd "$mod" && go test ./...) || exit 1
        done

  test:integration:
    desc: Run testcontainer-backed adapter tests (requires Docker; opt-in via build tags)
    # The cmdworkflow/dbos and cmdworkflow/restate adapter tests sit
    # behind //go:build {dbos,restate} tags because they spin up real
    # Postgres / Restate containers via testcontainers-go. Excluded from
    # `task test` so devs without Docker installed don't see spurious
    # failures. `task ci:integration` (and the CI integration job) runs
    # them in environments where Docker is guaranteed.
    cmds:
      - echo "=== go test -tags dbos in ./adapters/cmdworkflow/dbos ==="
      - cd ./adapters/cmdworkflow/dbos && go test -tags dbos ./...
      - echo "=== go test -tags restate in ./adapters/cmdworkflow/restate ==="
      - cd ./adapters/cmdworkflow/restate && go test -tags restate ./...

  vet:
    desc: Run go vet across all workspace modules
    cmds:
      - |
        for mod in {{.MODULES}}; do
          echo "=== go vet in $mod ===" && (cd "$mod" && go vet ./...) || exit 1
        done

  build:
    desc: Build all packages across all workspace modules
    cmds:
      - |
        for mod in {{.MODULES}}; do
          echo "=== go build in $mod ===" && (cd "$mod" && go build ./...) || exit 1
        done

  generate:
    desc: Run buf + sqlc codegen
    cmds:
      - cd proto && buf generate
      - cd ./adapters/storage/postgres && sqlc generate
      - cd ./adapters/storage/sqlite   && sqlc generate

  generate:check:
    desc: Verify generated code is up to date (CI gate)
    deps: [generate]
    cmds:
      - |
        if [ -n "$(git status --porcelain gen adapters/storage/*/internal/db adapters/cmdworkflow/*/gen)" ]; then
          echo "ERROR: generated code is out of date. Run 'task generate' and commit." >&2
          git status --porcelain gen adapters/storage/*/internal/db adapters/cmdworkflow/*/gen >&2
          exit 1
        fi

  lint:proto:
    desc: Run buf lint and buf breaking
    cmds:
      - cd proto && buf lint
      # buf breaking resolves git refs relative to its working dir, so
      # point at the parent's .git from inside proto/.
      - cd proto && buf breaking --against '../.git#branch=main,subdir=proto'

  lint:upcasters:
    desc: Verify every event with schema_version > 1 has a MigratingCodec (ADR 0013)
    cmds:
      - go run ./cmd/eslint-upcasters

  ci:
    desc: CI gate — vet, tests, examples, generated-code freshness, proto lint, upcaster discipline
    cmds:
      - task: vet
      - task: test
      - task: test:examples
      - task: generate:check
      - task: lint:proto
      - task: lint:upcasters

  ci:integration:
    desc: CI integration gate — testcontainer-backed adapter tests (Docker required)
    # Split from the main ci gate because these tests cost ~1-2 minutes
    # each, need Docker, and historically have only run when a
    # maintainer opted in via -tags manually. The new ci-integration
    # job in .github/workflows/ci.yml runs this on every PR so DBOS /
    # Restate adapter regressions are caught before merge, not after.
    cmds:
      - task: test:integration

  clean:
    desc: Remove build artifacts
    cmds:
      - |
        for mod in {{.MODULES}}; do
          (cd "$mod" && go clean ./...) || exit 1
        done

  release:
    desc: Tag a synchronized release across all published modules (VERSION=vX.Y.Z)
    requires:
      vars: [VERSION]
    cmds:
      - ./scripts/release.sh {{.VERSION}}
